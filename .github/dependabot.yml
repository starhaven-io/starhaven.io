version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      exclude:
        - "starhaven-io/*"
        # A new Ruby is unusable until setup-ruby knows it exists, so a
        # cooldown here delays every Ruby bump for no safety.
        - "ruby/setup-ruby"
    ignore:
      # Fleet pins are owned by the sync; Dependabot never writes them.
      - dependency-name: "starhaven-io/.github/*"
    groups:
      "github-actions":
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    ignore:
      # TypeScript 7.0 lacks Astro's required API; reassess with 7.1: https://github.com/withastro/astro/issues/17268
      - dependency-name: "typescript"
        versions:
          - ">=7.0.0 <7.1.0"
    groups:
      "npm-dependencies":
        patterns:
          - "*"
