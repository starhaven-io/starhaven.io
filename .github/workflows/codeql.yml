name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - ".github/workflows/**"
      - "astro.config.mjs"
      - "package-lock.json"
      - "package.json"
      - "tsconfig.json"
      - "wrangler.jsonc"

concurrency:
  group: "codeql-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: Analyze
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-codeql.yml@5f266219bb9c86c8c24f7743bbbe9accb665010c # v2026.07.05.6
    with:
      languages: '["actions","javascript-typescript"]'
      runner: "ubuntu-24.04"
      timeout-minutes: 30
      build-mode: ""
      build-profile: ""
