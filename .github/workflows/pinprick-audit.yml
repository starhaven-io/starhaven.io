name: pinprick audit

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main

concurrency:
  group: "pinprick-audit-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  audit:
    name: Audit
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-pinprick-audit.yml@20371f85e8e55e28feb2bec0c957514153e0f1d8 # v2026.07.05.9
    with:
      advanced-security: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      fail-on-findings: true
