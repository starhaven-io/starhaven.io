name: Fleet Guard

on:
  pull_request:

permissions: {}

concurrency:
  group: "fleet-guard-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-fleet-guard.yml@03a3794cb337d13703059eb02b44a8d419833ebd # v2026.07.08.1
    with:
      repo-name: ${{ github.event.repository.name }}
