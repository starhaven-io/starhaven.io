name: Fleet Guard

on:
  pull_request:

permissions: {}

concurrency:
  group: "fleet-guard-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-fleet-guard.yml@0734e39d7ea40beeac4bae344629f49be9b343e8 # v2026.07.16.1
    with:
      repo-name: ${{ github.event.repository.name }}
