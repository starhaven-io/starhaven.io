name: Fleet Guard

on:
  pull_request:

permissions: {}

concurrency:
  group: "fleet-guard-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-fleet-guard.yml@a11eda1f0ced9bbcc1ee297dbb19d38fe8c19323 # v2026.07.16.2
    with:
      repo-name: ${{ github.event.repository.name }}
