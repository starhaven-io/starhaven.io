name: Fleet Guard

on:
  pull_request:

permissions: {}

concurrency:
  group: "fleet-guard-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-fleet-guard.yml@989b76e2b1ceaf3531da903e288e79929bd2f30e # v2026.07.05.10
    with:
      repo-name: ${{ github.event.repository.name }}
