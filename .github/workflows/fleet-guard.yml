name: Fleet Guard

on:
  pull_request:

permissions: {}

concurrency:
  group: "fleet-guard-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-fleet-guard.yml@20371f85e8e55e28feb2bec0c957514153e0f1d8 # v2026.07.05.9
    with:
      hub-ref: "20371f85e8e55e28feb2bec0c957514153e0f1d8"
      repo-name: ${{ github.event.repository.name }}
