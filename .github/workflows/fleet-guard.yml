name: Fleet Guard

on:
  pull_request:

permissions: {}

concurrency:
  group: "fleet-guard-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-fleet-guard.yml@0cffea358b31930d0068ad1419e7522d1ea37764 # v2026.07.16.3
    with:
      repo-name: ${{ github.event.repository.name }}
