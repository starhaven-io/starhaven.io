name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  # PR body/title edits fire `edited` events; give them their own per-run group so
  # they can't cancel in-flight tests from the preceding `opened`/`synchronize` run.
  group: ${{ github.event.action == 'edited' && format('ci-edit-{0}-{1}', github.ref, github.run_id) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

permissions: {}

jobs:
  commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read # required to read PR titles
    uses: starhaven-io/.github/.github/workflows/reusable-conventional-commits.yml@ca53feb55a6153eb56aec343972368432fdbc5c3 # v2026.07.20.1

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26

      - name: Check npm install-script policy
        run: node scripts/check-npm-install-policy.mjs .

      - name: Install dependencies
        # Fail if an unreviewed dependency install script is introduced.
        run: npm ci --strict-allow-scripts

      - name: Install typos-cli
        run: cargo install typos-cli --locked --version 1.48.0

      - name: Typos
        run: typos

      - name: Prettier check
        run: npm run format:check

      - name: Astro check
        run: npm run check

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26

      - name: Check npm install-script policy
        run: node scripts/check-npm-install-policy.mjs .

      - name: Install dependencies
        # Fail if an unreviewed dependency install script is introduced.
        run: npm ci --strict-allow-scripts

      - name: Build
        run: npm run build

      - name: Deploy dry-run
        run: npm run deploy:dry
        env:
          WRANGLER_SEND_METRICS: "false"

  zizmor:
    name: zizmor
    permissions:
      contents: read
      security-events: write # required for zizmor SARIF upload
    uses: starhaven-io/.github/.github/workflows/reusable-zizmor.yml@ca53feb55a6153eb56aec343972368432fdbc5c3 # v2026.07.20.1

  codeql:
    name: CodeQL
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-codeql.yml@ca53feb55a6153eb56aec343972368432fdbc5c3 # v2026.07.20.1
    with:
      languages: '["javascript-typescript"]'
      runner: "ubuntu-24.04"
      timeout-minutes: 30
      build-mode: ""
      build-profile: ""

  conclusion:
    name: conclusion
    needs: [commits, lint, build, zizmor, codeql]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: always()
    steps:
      - name: Result
        env:
          COMMITS_RESULT: ${{ needs.commits.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          ZIZMOR_RESULT: ${{ needs.zizmor.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
        run: |
          for RESULT in "${COMMITS_RESULT}" "${LINT_RESULT}" "${BUILD_RESULT}" "${ZIZMOR_RESULT}" "${CODEQL_RESULT}"; do
            if [[ "${RESULT}" != "success" && "${RESULT}" != "skipped" ]]; then
              echo "::error::One or more checks failed."
              exit 1
            fi
          done
