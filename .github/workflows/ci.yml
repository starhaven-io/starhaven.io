name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  # PR body/title edits fire `edited` events; give them their own per-run group so
  # they can't cancel in-flight tests from the preceding `opened`/`synchronize` run.
  group: ${{ github.event.action == 'edited' && format('ci-edit-{0}-{1}', github.ref, github.run_id) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

permissions: {}

jobs:
  commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read # required to read PR titles
    uses: starhaven-io/.github/.github/workflows/reusable-conventional-commits.yml@5f266219bb9c86c8c24f7743bbbe9accb665010c # v2026.07.05.6

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install dependencies
        # Fail closed on unreviewed install scripts (npm v12 default; see allowScripts in package.json).
        run: npm ci --strict-allow-scripts

      - name: Install typos-cli
        run: cargo install typos-cli --locked --version 1.48.0

      - name: Typos
        run: typos

      - name: Prettier check
        run: npm run format:check

      - name: Astro check
        run: npm run check

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install dependencies
        # Fail closed on unreviewed install scripts (npm v12 default; see allowScripts in package.json).
        run: npm ci --strict-allow-scripts

      - name: Build
        run: npm run build

      - name: Deploy dry-run
        run: npm run deploy:dry
        env:
          WRANGLER_SEND_METRICS: "false"

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # required for zizmor SARIF upload
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: auditor

  codeql:
    name: CodeQL
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:javascript-typescript"

  conclusion:
    name: conclusion
    needs: [commits, lint, build, zizmor, codeql]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: always()
    steps:
      - name: Result
        env:
          COMMITS_RESULT: ${{ needs.commits.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          ZIZMOR_RESULT: ${{ needs.zizmor.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
        run: |
          for RESULT in "${COMMITS_RESULT}" "${LINT_RESULT}" "${BUILD_RESULT}" "${ZIZMOR_RESULT}" "${CODEQL_RESULT}"; do
            if [[ "${RESULT}" != "success" && "${RESULT}" != "skipped" ]]; then
              echo "::error::One or more checks failed."
              exit 1
            fi
          done
