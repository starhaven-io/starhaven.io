name: Link Check

on:
  schedule:
    - cron: "0 14 * * 1" # every Monday at 14:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  lychee:
    name: Check links
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-link-check.yml@3599e5b87594440da1e8100ee3d757e261297a85 # v2026.07.05.1
    with:
      args: "--config lychee.toml --root-dir ${{ github.workspace }}/dist/client './dist/client/**/*.html' README.md"
      build-site: true
      site-directory: ""
      authenticated-github: false
