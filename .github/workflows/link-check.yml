name: Link Check

on:
  schedule:
    - cron: "0 14 * * 1" # every Monday at 14:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: "link-check"
  cancel-in-progress: true

jobs:
  lychee:
    name: Check links
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-link-check.yml@989b76e2b1ceaf3531da903e288e79929bd2f30e # v2026.07.05.10
    with:
      args: "--config lychee.toml --root-dir dist/client './dist/client/**/*.html' README.md"
      build-site: true
      site-directory: ""
      authenticated-github: false
