name: Link Check

on:
  schedule:
    - cron: "0 14 * * 1" # every Monday at 14:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: "link-check"
  cancel-in-progress: true

jobs:
  lychee:
    name: Check links
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-link-check.yml@0cffea358b31930d0068ad1419e7522d1ea37764 # v2026.07.16.3
    with:
      args: "--config lychee.toml --root-dir dist/client './dist/client/**/*.html' README.md"
      build-site: true
      site-directory: ""
      authenticated-github: false
