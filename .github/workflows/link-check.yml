name: Link Check

on:
  schedule:
    - cron: "0 14 * * 1" # every Monday at 14:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: link-check
  cancel-in-progress: true

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          package-manager-cache: false

      - name: Install dependencies
        # Fail closed on unreviewed install scripts (npm v12 default; see allowScripts in package.json).
        run: npm ci --strict-allow-scripts

      - name: Build site
        run: npm run build

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config lychee.toml --root-dir ${{ github.workspace }}/dist/client './dist/client/**/*.html' README.md
          fail: true
